<div class="move-detail-container">
  <section class="search-section">
    <h2>기술 검색</h2>
    <div class="search-controls">
      <input
        type="text"
        id="pokemon-search"
        placeholder="기술명을 검색하세요"
        [(ngModel)]="moveSearchInput"
        (keyup.enter)="onSearchButtonClick()"
        autocomplete="off"
      />
      <button id="searchButton" (click)="onSearchButtonClick()">검색</button>
    </div>

    <div class="filter-controls">
      <div class="filter-group">
        <span class="filter-label">접촉 여부</span>
        <div class="chip-container">
          <label
            class="filter-chip"
            [class.active]="isFilterActive('contact', '접촉')"
          >
            <input
              type="checkbox"
              [checked]="isFilterActive('contact', '접촉')"
              (change)="toggleFilter('contact', '접촉')"
              class="hidden-checkbox"
            />
            <span>접촉</span>
          </label>
          <label
            class="filter-chip"
            [class.active]="isFilterActive('contact', '비접촉')"
          >
            <input
              type="checkbox"
              [checked]="isFilterActive('contact', '비접촉')"
              (change)="toggleFilter('contact', '비접촉')"
              class="hidden-checkbox"
            />
            <span>비접촉</span>
          </label>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">분류</span>
        <div class="chip-container">
          @for (cat of categoryList; track cat) {
            <label
              class="filter-chip"
              [class.active]="isFilterActive('category', cat)"
            >
              <input
                type="checkbox"
                [checked]="isFilterActive('category', cat)"
                (change)="toggleFilter('category', cat)"
                class="hidden-checkbox"
              />
              <span>{{ cat }}</span>
            </label>
          }
        </div>
      </div>
    </div>
  </section>
  <div class="move-list-container">
    @for (moveDetail of searchResults; track moveDetail.id) {
      <app-move-card [moveDetail]="moveDetail"></app-move-card>
    }
  </div>
</div>
