<div style="position: relative; display: inline-block">
  <canvas
    #spriteCanvas
    class="sprite-canvas"
    [class.small-image]="isSmallImage"
    width="96"
    height="96"
    (click)="onCanvasClick($event)"
    (contextmenu)="$event.preventDefault()"
  ></canvas>
  <div
    style="
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      cursor: pointer;
    "
    (click)="onCanvasClick($event)"
  ></div>
</div>
