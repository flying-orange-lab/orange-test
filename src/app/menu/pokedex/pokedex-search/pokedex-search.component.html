<div class="search-header">
  <h2>포켓몬 검색</h2>
</div>

<div class="search-controls">
  <div class="main-container">
    <input
      type="text"
      id="pokemon-search"
      placeholder="포켓몬 이름, 도감번호를 검색하세요..."
      [(ngModel)]="pokemonSearchInput"
      (keyup.enter)="onSearchButtonClick()"
      autocomplete="off"
    />
    <button id="searchButton" (click)="onSearchButtonClick()" title="검색">
      <i class="fas fa-search"></i>
    </button>
    <button id="resetButton" (click)="resetSearch()" title="초기화">
      <i class="fas fa-undo"></i>
    </button>
  </div>

  <div class="toggle-container">
    <button
      class="advanced-search-toggle"
      (click)="toggleAdvancedSearch()"
      title="고급 검색"
      [class.active]="isAdvancedSearchOpen"
    >
      <i class="fas fa-sliders-h"></i>
      <span class="toggle-text">고급 검색</span>
    </button>
  </div>
</div>

@if (isAdvancedSearchOpen) {
  <div class="advanced-search-controls">
    <div class="advanced-input-group">
      <label for="ability-search">특성</label>
      <input
        type="text"
        id="ability-search"
        placeholder="특성 이름..."
        [(ngModel)]="abilitySearchInput"
        (keyup.enter)="onSearchButtonClick()"
        autocomplete="off"
      />
    </div>
    <div class="advanced-input-group">
      <label for="move-search">기술</label>
      <input
        type="text"
        matInput
        id="move-search"
        placeholder="기술 이름..."
        [(ngModel)]="moveSearchInput"
        (ngModelChange)="onMoveSearchChange()"
        (keyup.enter)="onSearchButtonClick()"
        autocomplete="off"
        [matAutocomplete]="auto"
      />
      <mat-autocomplete #auto="matAutocomplete">
        @for (moveName of filteredMoveNames; track $index) {
          <mat-option [value]="moveName">{{ moveName }}</mat-option>
        }
      </mat-autocomplete>
    </div>
    <div class="advanced-input-group">
      <span>타입</span>
      <div class="type-filter-grid">
        @for (typeKey of typeLabels; track typeKey) {
          <button
            class="type-button"
            [class.selected]="selectedType === typeKey"
            [ngClass]="'type-' + typeKey"
            (click)="onTypeFilterClick(typeKey)"
          >
            {{ typeDisplay[typeKey] }}
          </button>
        }
      </div>
    </div>
  </div>
}
