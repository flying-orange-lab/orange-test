<div class="search-header">
  <h2>포켓몬 검색</h2>
</div>

<div class="search-controls">
  <div class="main-container">
    <input
      type="text"
      id="pokemon-search"
      placeholder="포켓몬 이름, 도감번호를 검색하세요..."
      [(ngModel)]="pokemonSearchInput"
      (keyup.enter)="onSearchButtonClick()"
      autocomplete="off"
    />
    <button id="searchButton" (click)="onSearchButtonClick()" title="검색" style="display: flex; align-items: center; justify-content: center;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor" width="1em" height="1em"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/></svg>
    </button>
    <button id="resetButton" (click)="resetSearch()" title="초기화" style="display: flex; align-items: center; justify-content: center;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor" width="1em" height="1em"><path d="M125.7 160H176c13.3 0 24 10.7 24 24s-10.7 24-24 24H48c-13.3 0-24-10.7-24-24V64c0-13.3 10.7-24 24-24s24 10.7 24 24v51.4C121.9 64.3 189.2 32 264 32c123.7 0 224 100.3 224 224s-100.3 224-224 224c-103.5 0-190.5-70.3-217.4-165.7c-3.8-12.8 3.6-26.2 16.4-30s26.2 3.6 30 16.4C137.1 378.1 205.8 432 280 432c97.2 0 176-78.8 176-176s-78.8-176-176-176c-67.9 0-126.9 38.6-154.3 96z"/></svg>
    </button>
  </div>

  <div class="toggle-container">
    <button
      class="advanced-search-toggle"
      (click)="toggleAdvancedSearch()"
      title="고급검색"
      [class.active]="isAdvancedSearchOpen"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor" width="1em" height="1em"><path d="M0 416c0 17.7 14.3 32 32 32l54.7 0c12.3 28.3 40.5 48 73.3 48s61-19.7 73.3-48L480 448c17.7 0 32-14.3 32-32s-14.3-32-32-32l-246.7 0c-12.3-28.3-40.5-48-73.3-48s-61 19.7-73.3 48L32 384c-17.7 0-32 14.3-32 32zm160 0a16 16 0 1 1 0 32 16 16 0 1 1 0-32zM512 256c0-17.7-14.3-32-32-32l-54.7 0c-12.3-28.3-40.5-48-73.3-48s-61 19.7-73.3 48L32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l246.7 0c12.3 28.3 40.5 48 73.3 48s61-19.7 73.3-48l54.7 0c17.7 0 32-14.3 32-32zm-160 0a16 16 0 1 1 0-32 16 16 0 1 1 0 32zM0 96C0 113.7 14.3 128 32 128l54.7 0c12.3 28.3 40.5 48 73.3 48s61-19.7 73.3-48L480 128c17.7 0 32-14.3 32-32s-14.3-32-32-32l-246.7 0c-12.3-28.3-40.5-48-73.3-48s-61 19.7-73.3 48L32 64C14.3 64 0 78.3 0 96zm160 0a16 16 0 1 1 0 32 16 16 0 1 1 0-32z"/></svg>
      <span class="toggle-text">고급검색</span>
      @if (hasAdvancedSearchContent) {
        <span class="notification-dot"></span>
      }
    </button>
  </div>
</div>

@if (isAdvancedSearchOpen) {
  <div class="advanced-search-controls">
    <div class="advanced-input-group">
      <label for="ability-search">특성</label>
      <input
        type="text"
        matInput
        id="ability-search"
        placeholder="특성 이름..."
        [(ngModel)]="abilitySearchInput"
        (ngModelChange)="onAbilitySearchChange()"
        (keyup.enter)="onSearchButtonClick()"
        autocomplete="off"
        [matAutocomplete]="abilityAuto"
      />
      <mat-autocomplete
        #abilityAuto="matAutocomplete"
        (optionSelected)="onSearchButtonClick()"
      >
        @for (abilityName of filteredAbilityNames; track $index) {
          <mat-option [value]="abilityName">{{ abilityName }}</mat-option>
        }
      </mat-autocomplete>
    </div>
    <div class="advanced-input-group">
      <label for="move-search">기술</label>
      <input
        type="text"
        matInput
        id="move-search"
        placeholder="기술 이름..."
        [(ngModel)]="moveSearchInput"
        (ngModelChange)="onMoveSearchChange()"
        (keyup.enter)="onSearchButtonClick()"
        autocomplete="off"
        [matAutocomplete]="auto"
      />
      <mat-autocomplete
        #auto="matAutocomplete"
        (optionSelected)="onSearchButtonClick()"
      >
        @for (moveName of filteredMoveNames; track $index) {
          <mat-option [value]="moveName">{{ moveName }}</mat-option>
        }
      </mat-autocomplete>
    </div>
    <div class="advanced-input-group">
      <span>타입</span>
      <div class="type-filter-grid">
        @for (typeKey of typeLabels; track typeKey) {
          <button
            class="type-button"
            [class.selected]="selectedType === typeKey"
            [ngClass]="'type-' + typeKey"
            (click)="onTypeFilterClick(typeKey)"
          >
            {{ typeDisplay[typeKey] }}
          </button>
        }
      </div>
    </div>
  </div>
}
