<div class="guide-close-button" (click)="onCloseClick()" style="display: flex; align-items: center; justify-content: center;">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" fill="currentColor" width="1em" height="1em"><path d="M342.6 150.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192 210.7 86.6 105.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L146.7 256 41.4 361.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192 301.3 297.4 406.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.3 256 342.6 150.6z"/></svg>
</div>

<div class="pokemon-card-container">
  <div class="pokemon-card-content">
    <button
      class="gender-button male-active"
      (click)="showPopover($event, 'gender')"
    >
      <ng-container [ngTemplateOutlet]="helperIcon"></ng-container>

      {{ "♀" }}
    </button>
    <div class="helper-box" style="border: 1px solid #007bff">
      <ng-container [ngTemplateOutlet]="helperIcon"></ng-container>

      <img
        class="pokemon-image"
        [ngSrc]="currentImageUrl"
        width="96"
        height="96"
        (click)="showPopover($event, 'sprite')"
      />
    </div>
    <div class="pokemon-info">
      <div class="pokemon-name">{{ pokemon.koreanName || pokemon.name }}</div>
      <div class="pokemon-id">{{ displayId }}</div>
    </div>
    <div
      class="pokemon-types-container helper-box"
      (click)="showPopover($event, 'typebtn')"
    >
      <ng-container [ngTemplateOutlet]="helperIcon"></ng-container>

      <span class="type-badge type-normal"> 노말 </span>
    </div>

    <app-pokemon-stat
      style="width: 100%; margin-top: 15px"
      [pokemonStats]="currentPokemonStats"
    ></app-pokemon-stat>
  </div>

  <div class="pokemon-ability">
    <div
      class="ability-name-box helper-box"
      (click)="showPopover($event, 'ability')"
    >
      <ng-container [ngTemplateOutlet]="helperIcon"></ng-container>

      <div class="ability-name">매직미러</div>
      <div class="ability-name">의기양양</div>
    </div>
  </div>

  <div
    class="pokemon-form-buttons helper-box"
    (click)="showPopover($event, 'form')"
  >
    <ng-container [ngTemplateOutlet]="helperIcon"></ng-container>

    <button class="form-button">일반</button>
    <button class="form-button">어나더폼</button>
  </div>

  <div
    class="pokemon-card-extra helper-box"
    (click)="showPopover($event, 'evol')"
  >
    <div class="extra-title">
      <strong>
        진화 정보
        <ng-container [ngTemplateOutlet]="helperIconAfter"></ng-container>
      </strong>
    </div>
    <div class="extra-section extra-evolution">
      <div>진화 정보 없음</div>
    </div>
  </div>

  <div class="pokemon-card-extra" (click)="showPopover($event, 'wilditem')">
    <div class="extra-title">
      <strong>
        야생 정보
        <ng-container [ngTemplateOutlet]="helperIconAfter"></ng-container>
      </strong>
    </div>
    <div class="extra-section">
      <div>야생 아이템 정보 없음</div>
    </div>
  </div>

  <div class="pokemon-card-extra" (click)="showPopover($event, 'extra')">
    <div class="extra-title">
      <strong>
        추가 서식 정보
        <ng-container [ngTemplateOutlet]="helperIconAfter"></ng-container>
      </strong>
    </div>
    <div class="extra-section">
      <div>대타출동 사용 시 등장</div>
    </div>
  </div>

  <div class="pokemon-card-extra" (click)="showPopover($event, 'wilddetail')">
    <ng-container [ngTemplateOutlet]="helperIcon"></ng-container>

    <!--app-pokemon-location-->
    <div class="extra-title">
      <strong
        >등장 위치
        <ng-container [ngTemplateOutlet]="helperIconAfter"></ng-container>
      </strong>
      <div
        class="extra-floating-button"
        (click)="showPopover($event, 'wilddetailbtn')"
        style="display: flex; align-items: center; justify-content: center;"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor" width="1em" height="1em"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/></svg>
      </div>
    </div>
    <div class="extra-section">
      <div class="location-entry">
        <div class="description">
          <div class="location-name">대타출동</div>
          <div class="location-area">전지역</div>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-container #popoverContainer></ng-container>
<ng-template #helperIcon>
  <div class="helper-button" style="display: flex; align-items: center; justify-content: center;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor" width="1em" height="1em"><path d="M256 48a208 208 0 1 1 0 416 208 208 0 1 1 0-416zm0 464A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM169.1 212.5c4-54.4 46.2-95.2 97.4-95.2c56 0 102 46.5 102 102.3c0 30.7-18.4 57.5-39.7 75.8c-12.4 10.7-25.1 20.3-25.1 33.7c0 10.2-7 19.3-16.7 22.8c-1.3 .5-2.6 .8-4 .8c-8.8 0-16-7.2-16-16V328c0-21.8 11.2-40 27.6-53.7c9.5-8 23.9-20.1 23.9-39.5c0-30.8-21.6-54.3-54-54.3c-28.5 0-51 22.1-51.5 50.4c-.1 8.8-7.3 15.9-16.1 15.8c-8.8-.1-15.9-7.3-15.8-16.1zM288 416a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z"/></svg>
  </div>
</ng-template>
<ng-template #helperIconAfter>
  <div class="helper-button-after" style="display: flex; align-items: center; justify-content: center;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor" width="1em" height="1em"><path d="M256 48a208 208 0 1 1 0 416 208 208 0 1 1 0-416zm0 464A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM169.1 212.5c4-54.4 46.2-95.2 97.4-95.2c56 0 102 46.5 102 102.3c0 30.7-18.4 57.5-39.7 75.8c-12.4 10.7-25.1 20.3-25.1 33.7c0 10.2-7 19.3-16.7 22.8c-1.3 .5-2.6 .8-4 .8c-8.8 0-16-7.2-16-16V328c0-21.8 11.2-40 27.6-53.7c9.5-8 23.9-20.1 23.9-39.5c0-30.8-21.6-54.3-54-54.3c-28.5 0-51 22.1-51.5 50.4c-.1 8.8-7.3 15.9-16.1 15.8c-8.8-.1-15.9-7.3-15.8-16.1zM288 416a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z"/></svg>
  </div>
</ng-template>
