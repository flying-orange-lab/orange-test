<main class="pokedex-page">
  <section class="search-section">
    <button
      id="favoriteFilterButton"
      [class.active]="showFavoritesOnly"
      (click)="toggleFavoriteFilter()"
      title="즐겨찾기 전용 보기"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" fill="currentColor" width="1em" height="1em" [class.favorite-icon-active]="showFavoritesOnly"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"/></svg>
    </button>
    <app-pokedex-search></app-pokedex-search>

    @if (noResultsMessage) {
      <p id="noResultsMessage">{{ noResultsMessage }}</p>
    }
    <div id="searchResults" class="pokemon-grid">
      @for (pokemon of searchResults; track pokemon.id) {
        <div class="pokemon-card-wrapper">
          <app-pokemon-card
            [pokemon]="pokemon"
            (defenseEvent)="onTypesClick($event)"
          >
          </app-pokemon-card>
        </div>
      }
    </div>
  </section>

  <div class="defense-container" [class.active]="isDefenseOpen">
    <div class="header">
      <div class="header-line" (click)="onTypeClose()">
        <span class="line"></span>
        <span class="line"></span>
      </div>
    </div>
    <div class="defense-box">
      <app-defense></app-defense>
    </div>
  </div>

  <nav class="pagination-container">
    <ul class="pagination-list">
      <li
        class="pagination-item prev"
        [class.disabled]="pokemonSearchOffset === 0"
      >
        <button style="width: 100%" (click)="onPageButtonClick(false)">
          <span style="display: flex; align-items: center; justify-content: center;"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512" fill="currentColor" width="1em" height="1em"><path d="M41.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 256 246.6 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg></span>
        </button>
      </li>
      <li class="pagination-item next">
        <button style="width: 100%" (click)="onPageButtonClick(true)">
          <span style="display: flex; align-items: center; justify-content: center;"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512" fill="currentColor" width="1em" height="1em"><path d="M278.6 233.4c12.5 12.5 12.5 32.8 0 45.3l-160 160c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L210.7 256 73.4 118.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l160 160z"/></svg></span>
        </button>
      </li>
    </ul>
  </nav>
</main>

@if (isHelperOpen) {
  <app-pokedex-guide class="helper"></app-pokedex-guide>
}
